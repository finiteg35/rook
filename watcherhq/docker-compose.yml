version: "3.9"

services:
  backend:
    image: finiteg35/watcherhq-backend:latest
    container_name: watcherhq_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - watcherhq_db:/app/data
    networks:
      - watcherhq_net

  frontend:
    image: finiteg35/watcherhq-frontend:latest
    container_name: watcherhq_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    networks:
      - watcherhq_net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: watcherhq_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/watcherhq-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - watcherhq_net
    depends_on:
      - backend
      - frontend

volumes:
  watcherhq_db:

networks:
  watcherhq_net:
    driver: bridge
